<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>flip-ai Session Importer</title>
    <style>
      body {
        margin: 0;
        padding: 16px;
        width: 420px;
        font-family: Georgia, "Times New Roman", serif;
        background: linear-gradient(160deg, #f5efe3 0%, #eadcc4 100%);
        color: #2f2419;
      }
      h1 {
        margin: 0 0 12px;
        font-size: 20px;
      }
      p {
        margin: 0 0 12px;
        line-height: 1.4;
      }
      label {
        display: block;
        margin: 12px 0 6px;
        font-weight: 700;
      }
      input, textarea, button {
        width: 100%;
        box-sizing: border-box;
        font: inherit;
        border-radius: 10px;
      }
      input, textarea {
        padding: 10px 12px;
        border: 1px solid #cdbb99;
        background: #fffaf2;
      }
      textarea {
        min-height: 110px;
        resize: vertical;
      }
      button {
        border: 0;
        padding: 12px 14px;
        margin-top: 12px;
        background: #7c4f18;
        color: #fff;
        cursor: pointer;
      }
      button.secondary {
        background: #e7d8ba;
        color: #5a4426;
      }
      .row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }
      .status {
        white-space: pre-wrap;
        margin-top: 12px;
        padding: 10px 12px;
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.6);
        border: 1px solid rgba(120, 79, 24, 0.15);
        min-height: 96px;
      }
      .hint {
        font-size: 13px;
        color: #5f5a52;
      }
      .provider {
        margin-top: 14px;
        padding-top: 12px;
        border-top: 1px solid rgba(120, 79, 24, 0.16);
      }
      .provider-title {
        margin: 0 0 8px;
        font-size: 15px;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <h1>flip-ai Importer</h1>
    <p class="hint">Xiaomi, DeepSeek e Kimi usam sessão do navegador. Gemini, Groq, OpenRouter e Cloudflare usam API keys oficiais.</p>

    <label for="proxyUrl">Proxy URL</label>
    <input id="proxyUrl" type="url" placeholder="https://seu-proxy.exemplo.com">

    <label for="apiKey">API Key administrativa</label>
    <input id="apiKey" type="password" placeholder="Opcional, só para /auth/import protegido">

    <div class="row">
      <button id="openXiaomi" type="button" class="secondary">Open Xiaomi</button>
      <button id="openDeepSeek" type="button" class="secondary">Open DeepSeek</button>
	  <button id="openKimi" type="button" class="secondary">Open Kimi</button>
    </div>

    <div class="row">
      <button id="saveConfig" type="button" class="secondary">Save Config</button>
      <button id="importDeepSeekSession" type="button">Import DeepSeek</button>
	  <button id="importKimiSession" type="button">Import Kimi</button>
    </div>

    <button id="importSession" type="button">Import Xiaomi Session</button>

    <div class="provider">
      <p class="provider-title">Gemini</p>
      <input id="geminiApiKey" type="password" placeholder="GEMINI_API_KEY">
      <div class="row">
        <button id="openGemini" type="button" class="secondary">Open Gemini</button>
        <button id="saveGemini" type="button">Save Gemini</button>
      </div>
    </div>

    <div class="provider">
      <p class="provider-title">Groq</p>
      <input id="groqApiKey" type="password" placeholder="GROQ_API_KEY">
      <div class="row">
        <button id="openGroq" type="button" class="secondary">Open Groq</button>
        <button id="saveGroq" type="button">Save Groq</button>
      </div>
    </div>

    <div class="provider">
      <p class="provider-title">OpenRouter</p>
      <input id="openRouterApiKey" type="password" placeholder="OPENROUTER_API_KEY">
      <input id="openRouterReferer" type="url" placeholder="HTTP Referer opcional">
      <input id="openRouterTitle" type="text" placeholder="App title opcional">
      <div class="row">
        <button id="openOpenRouter" type="button" class="secondary">Open OpenRouter</button>
        <button id="saveOpenRouter" type="button">Save OpenRouter</button>
      </div>
    </div>

    <div class="provider">
      <p class="provider-title">Cloudflare</p>
      <input id="cloudflareApiKey" type="password" placeholder="CLOUDFLARE_API_KEY">
      <input id="cloudflareAccountId" type="text" placeholder="CLOUDFLARE_ACCOUNT_ID">
      <div class="row">
        <button id="openCloudflare" type="button" class="secondary">Open Cloudflare</button>
        <button id="saveCloudflare" type="button">Save Cloudflare</button>
      </div>
    </div>

    <label for="status">Status</label>
    <textarea id="status" readonly></textarea>

    <script src="popup.js"></script>
  </body>
  </html>
